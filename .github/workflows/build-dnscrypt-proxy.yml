name: Build dnscrypt-proxy ARM packages

on:
  workflow_dispatch:
    inputs:
      dnscrypt_ref:
        description: DNSCrypt/dnscrypt-proxy release tag to build, or latest
        required: false
        default: latest
  pull_request:
    paths:
      - '.github/workflows/build-dnscrypt-proxy.yml'
  push:
    branches:
      - master
      - 'dev/**'
      - 'ci/**'
    paths:
      - '.github/workflows/build-dnscrypt-proxy.yml'

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-armv7
            goarch: arm
            goarm: '7'
            archive_arch: linux_arm
            package_dir: linux-arm
          - target: linux-armv8
            goarch: arm64
            goarm: ''
            archive_arch: linux_arm64
            package_dir: linux-arm64

    steps:
      - name: Resolve dnscrypt-proxy release
        id: dnscrypt
        env:
          DNSCRYPT_REF_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.dnscrypt_ref || 'latest' }}
        run: |
          set -euo pipefail

          dnscrypt_ref="${DNSCRYPT_REF_INPUT:-master}"

          if [ "${dnscrypt_ref}" = "latest" ]; then
            dnscrypt_ref="$(
              curl -fsSL \
                -H 'Accept: application/vnd.github+json' \
                -H 'X-GitHub-Api-Version: 2022-11-28' \
                https://api.github.com/repos/DNSCrypt/dnscrypt-proxy/releases/latest |
              sed -n 's/.*"tag_name": *"\([^"]*\)".*/\1/p' |
              head -n 1
            )"
          fi

          case "${dnscrypt_ref}" in
            ""|*[!abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789._-]*)
              echo "Invalid dnscrypt-proxy ref: ${dnscrypt_ref}" >&2
              exit 1
              ;;
          esac

          package_version="${dnscrypt_ref#v}"
          case "${package_version}" in
            ""|*[!abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789._-]*)
              echo "Invalid dnscrypt-proxy package version: ${package_version}" >&2
              exit 1
              ;;
          esac

          echo "ref=${dnscrypt_ref}" >> "${GITHUB_OUTPUT}"
          echo "package_version=${package_version}" >> "${GITHUB_OUTPUT}"

      - name: Check out dnscrypt-proxy source
        uses: actions/checkout@v4
        with:
          repository: DNSCrypt/dnscrypt-proxy
          ref: ${{ steps.dnscrypt.outputs.ref }}
          path: dnscrypt-proxy-src
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: dnscrypt-proxy-src/go.mod
          cache-dependency-path: dnscrypt-proxy-src/go.sum

      - name: Build dnscrypt-proxy
        run: |
          set -euo pipefail

          package_dir="${GITHUB_WORKSPACE}/dist/${{ matrix.package_dir }}"
          mkdir -p "${package_dir}"

          export CGO_ENABLED=0
          export GOOS=linux
          export GOARCH="${{ matrix.goarch }}"
          if [ -n "${{ matrix.goarm }}" ]; then
            export GOARM="${{ matrix.goarm }}"
          fi

          cd dnscrypt-proxy-src/dnscrypt-proxy
          go build -trimpath -ldflags="-s -w" -mod vendor -o "${package_dir}/dnscrypt-proxy"
          chmod 755 "${package_dir}/dnscrypt-proxy"

      - name: Package installer-compatible archive
        run: |
          set -euo pipefail

          package_dir="dist/${{ matrix.package_dir }}"
          archive="dnscrypt-proxy-${{ matrix.archive_arch }}-${{ steps.dnscrypt.outputs.package_version }}.tar.gz"

          cp dnscrypt-proxy-src/LICENSE "${package_dir}/LICENSE"
          cp dnscrypt-proxy-src/dnscrypt-proxy/example-*.txt "${package_dir}/"
          cp dnscrypt-proxy-src/dnscrypt-proxy/example-dnscrypt-proxy.toml "${package_dir}/"
          cp dnscrypt-proxy-src/dnscrypt-proxy/localhost.pem "${package_dir}/"

          tar -czf "dist/${archive}" -C dist "${{ matrix.package_dir }}"
          sha256sum "dist/${archive}" > "dist/${archive}.sha256"
          tar -tzf "dist/${archive}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: dnscrypt-proxy-${{ matrix.target }}-${{ steps.dnscrypt.outputs.package_version }}
          path: |
            dist/dnscrypt-proxy-${{ matrix.archive_arch }}-${{ steps.dnscrypt.outputs.package_version }}.tar.gz
            dist/dnscrypt-proxy-${{ matrix.archive_arch }}-${{ steps.dnscrypt.outputs.package_version }}.tar.gz.sha256
          if-no-files-found: error
